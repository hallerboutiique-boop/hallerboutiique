# fly.toml app configuration file generated for hallerboutiique on 2026-07-20T14:48:38+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'hallerboutiique'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'

[[mounts]]
  source = 'haller_data_recovery'
  destination = '/data'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory = '1024mb'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    soft_limit = 100
