name: One-time responsive image repair

on:
  push:
    paths:
      - .github/workflows/one-time-responsive-repair.yml

permissions:
  contents: read

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Regenerate COMPLETO CASUAL responsive images
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import shlex
          import sys
          import urllib.request

          token = os.environ["FLY_API_TOKEN"]
          javascript = r"""
          (async () => {
            const base = "http://127.0.0.1:8080/api/internal/product-image-optimization";
            const started = await fetch(base + "?force=1&product=two-piece-set-gucci", { method: "POST" });
            if (!started.ok) throw new Error("start " + started.status + ": " + await started.text());
            console.log(await started.text());
            for (let attempt = 0; attempt < 120; attempt += 1) {
              await new Promise((resolve) => setTimeout(resolve, 3000));
              const response = await fetch(base);
              if (!response.ok) throw new Error("poll " + response.status + ": " + await response.text());
              const status = await response.json();
              console.log(JSON.stringify(status));
              if (status.state !== "running") {
                if (status.state !== "completed" || status.failed !== 0) process.exit(2);
                if (status.total !== 5 || status.optimized !== 5) process.exit(3);
                return;
              }
            }
            throw new Error("responsive repair timed out");
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          """
          command = ["/bin/sh", "-lc", "node -e " + shlex.quote(javascript)]
          payload = json.dumps({"command": command, "timeout": 600}).encode()
          request = urllib.request.Request(
              "https://api.machines.dev/v1/apps/hallerboutiique/machines/18590d2a679978/exec",
              data=payload,
              headers={
                  "Authorization": "Bearer " + token,
                  "Content-Type": "application/json",
              },
              method="POST",
          )
          try:
              with urllib.request.urlopen(request, timeout=650) as response:
                  raw = response.read().decode("utf-8", "replace")
          except Exception as error:
              print(error, file=sys.stderr)
              raise
          print(raw)
          try:
              result = json.loads(raw)
          except json.JSONDecodeError:
              result = None
          if isinstance(result, dict) and result.get("exit_code", 0) != 0:
              raise SystemExit(result.get("exit_code", 1))
          PY
