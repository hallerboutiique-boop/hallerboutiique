name: One-time original zoom repair

on:
  push:
    paths:
      - .github/workflows/one-time-original-zoom-repair.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Check out latest main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Regenerate every cropped zoom from its original
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import shlex
          import urllib.request

          javascript = r"""
          (async () => {
            const base = 'http://127.0.0.1:8080/api/internal/product-zoom-image-optimization';
            const started = await fetch(base + '?force=1', { method: 'POST' });
            if (!started.ok) throw new Error('start ' + started.status + ': ' + await started.text());
            console.log(await started.text());
            for (let attempt = 0; attempt < 360; attempt += 1) {
              await new Promise((resolve) => setTimeout(resolve, 4000));
              const response = await fetch(base);
              if (!response.ok) throw new Error('poll ' + response.status + ': ' + await response.text());
              const status = await response.json();
              console.log(JSON.stringify(status));
              if (status.state !== 'running') {
                if (status.state !== 'completed' || status.failed !== 0) process.exit(2);
                if (status.total < 1 || status.optimized !== status.total) process.exit(3);
                return;
              }
            }
            throw new Error('original zoom repair timed out');
          })().catch((error) => { console.error(error); process.exit(1); });
          """
          command = ['/bin/sh', '-lc', 'node -e ' + shlex.quote(javascript)]
          payload = json.dumps({'command': command, 'timeout': 1500}).encode()
          request = urllib.request.Request(
              'https://api.machines.dev/v1/apps/hallerboutiique/machines/18590d2a679978/exec',
              data=payload,
              headers={'Authorization': 'Bearer ' + os.environ['FLY_API_TOKEN'], 'Content-Type': 'application/json'},
              method='POST',
          )
          with urllib.request.urlopen(request, timeout=1550) as response:
              raw = response.read().decode('utf-8', 'replace')
          print(raw)
          result = json.loads(raw) if raw else {}
          if isinstance(result, dict) and result.get('exit_code', 0) != 0:
              raise SystemExit(result.get('exit_code', 1))
          PY

      - name: Purge Bunny cache when configured
        env:
          BUNNY_API_KEY: ${{ secrets.BUNNY_API_KEY }}
        run: |
          if [ -z "$BUNNY_API_KEY" ]; then
            echo 'Bunny secret is not configured in Actions; immutable zoom URLs need no purge.'
            exit 0
          fi
          node scripts/purge-bunny-cache.mjs

      - name: Remove temporary workflow
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git pull --rebase origin main
          git rm .github/workflows/one-time-original-zoom-repair.yml
          git commit -m 'Remove completed original zoom repair workflow'
          git push origin HEAD:main
