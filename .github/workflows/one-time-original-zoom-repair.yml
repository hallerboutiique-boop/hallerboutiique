name: One-time original zoom repair

on:
  push:
    paths:
      - .github/workflows/one-time-original-zoom-repair.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Check out latest main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Publish cache-safe zoom loader
        run: |
          python3 - <<'PY'
          from pathlib import Path

          pages = ["account.html", "checkout.html", "index.html", "product.html", "ultimi-disponibili.html"]
          old_script = "script.js?v=tryon-face-lock-1"
          new_script = "script.js?v=product-zoom-original-crop-2"
          for name in pages:
              path = Path(name)
              text = path.read_text()
              if old_script not in text:
                  raise SystemExit(f"missing old script version in {name}")
              path.write_text(text.replace(old_script, new_script))

          script = Path("script.js")
          text = script.read_text()
          old_fetch = '    const response = await fetch("/api/products");'
          new_fetch = '    const response = await fetch(`/api/products?v=${encodeURIComponent(productImageVersion)}`, { cache: "no-store" });'
          if old_fetch not in text:
              raise SystemExit("missing catalog fetch")
          script.write_text(text.replace(old_fetch, new_fetch))

          test = Path("i18n.test.mjs")
          text = test.read_text()
          old_test = r"script\.js\?v=tryon-face-lock-1"
          new_test = r"script\.js\?v=product-zoom-original-crop-2"
          if old_test not in text:
              raise SystemExit("missing cache version test")
          test.write_text(text.replace(old_test, new_test))
          PY
          git diff --check

      - name: Test storefront
        run: |
          corepack enable
          corepack prepare pnpm@10.28.1 --activate
          pnpm install --frozen-lockfile
          pnpm test

      - name: Commit cache-safe loader
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add account.html checkout.html index.html product.html ultimi-disponibili.html script.js i18n.test.mjs
          git commit -m "Load original crop zoom without stale cache"
          git push origin main

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy latest main to Fly
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_DEPLOY_TOKEN }}
        run: flyctl deploy --remote-only -a hallerboutiique

      - name: Regenerate every cropped zoom from its original
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_DEPLOY_TOKEN }}
        run: |
          javascript="$(base64 -w0 <<'NODE'
          (async () => {
            const base = "http://127.0.0.1:8080/api/internal/product-zoom-image-optimization";
            const started = await fetch(base + "?force=1", { method: "POST" });
            const startedBody = await started.text();
            console.log(startedBody);
            if (!started.ok) throw new Error("start " + started.status + ": " + startedBody);
            for (let attempt = 0; attempt < 360; attempt += 1) {
              await new Promise((resolve) => setTimeout(resolve, 4000));
              const response = await fetch(base);
              const responseBody = await response.text();
              if (!response.ok) throw new Error("poll " + response.status + ": " + responseBody);
              const status = JSON.parse(responseBody);
              console.log(JSON.stringify(status));
              if (status.state !== "running") {
                if (status.state !== "completed" || status.failed !== 0) process.exit(2);
                if (status.total < 1 || status.optimized !== status.total) process.exit(3);
                return;
              }
            }
            throw new Error("original zoom repair timed out");
          })().catch((error) => { console.error(error); process.exit(1); });
          NODE
          )"
          remote_output="$(flyctl ssh console \
            -a hallerboutiique \
            --machine 18590d2a679978 \
            --pty=false \
            -C "/bin/sh -lc \"echo '$javascript' | base64 -d | node\"" \
          )"
          printf '%s\n' "$remote_output"
          if ! grep -q '"state":"completed"' <<<"$remote_output"; then
            echo "Fly did not report a completed original zoom repair." >&2
            exit 4
          fi

      - name: Purge Bunny cache when configured
        env:
          BUNNY_API_KEY: ${{ secrets.BUNNY_API_KEY }}
        run: |
          if [ -z "$BUNNY_API_KEY" ]; then
            echo "Bunny purge secret not configured; immutable zoom URLs need no object purge."
            exit 0
          fi
          curl --fail --silent --show-error \
            --request POST \
            --header "AccessKey: $BUNNY_API_KEY" \
            "https://api.bunny.net/purge?url=https%3A%2F%2Fwww.hallerboutiique.com%2Fapi%2Fproducts&async=true"

      - name: Remove temporary workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/one-time-original-zoom-repair.yml
          git commit -m "Remove completed original zoom repair workflow"
          git push origin main
